spring.application.name=Quiz Backend

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5434/quiz_multiuser_app}
spring.datasource.username=${DB_USERNAME:quiz_user}
spring.datasource.password=${DB_PASSWORD:quiz_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Connection Pool (Optional - fuer Performance)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

# Server Configuration
server.port=8080

# Suppress favicon not found exception
spring.web.resources.add-mappings=true

# logging.level.org.springframework.beans=DEBUG
# logging.level.org.springframework.context=DEBUG

# Suppress static resource not found exception logging
logging.level.org.springframework.web.servlet.resource.ResourceHttpRequestHandler=ERROR

