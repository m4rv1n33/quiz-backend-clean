spring.application.name=Quiz Backend

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5434/quiz_multiuser_app
spring.datasource.username=${DB_USERNAME:quiz_user}
spring.datasource.password=${DB_PASSWORD:quiz_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Connection Pool (Optional - for Performance)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

# Server Configuration
server.port=8080

# ========================================
# JWT Configuration
# ========================================
# Secret key for JWT signature
# IMPORTANT: In production, provide this as an environment variable
# At least 256 bit (32 characters) for HS256
jwt.secret=${JWT_SECRET:local-dev-jwt-secret-change-this-in-production-1234}

# Token validity in milliseconds
# 86400000 ms = 24 Stunden = 60*60*24*1000
jwt.expiration=86400000

logging.level.org.springframework.beans=DEBUG
logging.level.org.springframework.context=DEBUG